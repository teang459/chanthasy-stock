<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <title>Chanthasy Stock</title>
  <script>
    // GitHub Pages SPA redirect — encode the path as a query param so
    // index.html can restore it via history.replaceState after load.
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 2).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
