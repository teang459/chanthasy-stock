name: CI

# Lint + test on every push and PR. Vercel handles deploy after merge
# to master, but it doesn't gate on tests — this workflow is the gate.

on:
  push:
    branches: [master]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --include=optional

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
